<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>CM monogram</title>
  <defs>
    <style>
      .mark {
        fill: #111111;
        font-family: "Plus Jakarta Sans", "Segoe UI", Arial, sans-serif;
        font-size: 38px;
        font-weight: 700;
        letter-spacing: -0.06em;
      }
      @media (prefers-color-scheme: dark) {
